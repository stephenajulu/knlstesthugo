backend:
  name: git-gateway
  branch: main

# Enable multi-stage approval workflow (Draft -> In Review -> Ready -> Publish)
publish_mode: editorial_workflow

media_folder: "static/assets/images"
public_folder: "/assets/images"

collections:
  - name: "core_pages"
    label: "Core Pages"
    delete: false
    create: false
    files:
      - file: "content/_index.md"
        label: "Homepage"
        name: "homepage"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Body Class", name: "body_class", widget: "hidden", default: "home-page"}
          - {label: "Hero Details", name: "hero", widget: "object", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Subtitle", name: "subtitle", widget: "text", required: false},
              {label: "Background Image", name: "image", widget: "image", required: false},
              {label: "Primary Button Text", name: "primary_btn_text", widget: "string", required: false},
              {label: "Primary Button Link", name: "primary_btn_link", widget: "string", required: false},
              {label: "Secondary Button Text", name: "secondary_btn_text", widget: "string", required: false},
              {label: "Secondary Button Link", name: "secondary_btn_link", widget: "string", required: false}
            ]}
          - {label: "Highlights Grid", name: "highlights", widget: "list", summary: "{{title}} (icon: {{icon}})", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Icon name (e.g. book, mail, user)", name: "icon", widget: "string", required: false},
              {label: "Description", name: "text", widget: "text"},
              {label: "Target Link URL", name: "url", widget: "string", required: false}
            ]}
          - {label: "Body Content", name: "body", widget: "markdown"}

      - file: "content/who-we-are.md"
        label: "Who We Are"
        name: "who_we_are"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Layout", name: "layout", widget: "hidden", default: "about"}
          - {label: "Kicker", name: "kicker", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "text"}
          - {label: "About Hero Grid", name: "about_hero", widget: "object", fields: [
              {label: "Kicker", name: "kicker", widget: "string"},
              {label: "Title", name: "title", widget: "string"},
              {label: "Highlight Text", name: "highlight_text", widget: "text"},
              {label: "Paragraph 1", name: "text_1", widget: "text"},
              {label: "Paragraph 2", name: "text_2", widget: "text", required: false},
              {label: "Main Image", name: "image", widget: "image", required: false}
            ]}
          - {label: "Body Content", name: "body", widget: "markdown"}

      - file: "content/services.md"
        label: "Our Services Directory"
        name: "services_dir"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Layout", name: "layout", widget: "hidden", default: "services"}
          - {label: "Kicker", name: "kicker", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "text"}
          - {label: "Service Groups", name: "groups", widget: "list", summary: "{{title}} ({{number}})", fields: [
              {label: "Number (e.g. 01)", name: "number", widget: "string"},
              {label: "Group Title", name: "title", widget: "string"},
              {label: "Links", name: "links", widget: "list", summary: "{{name}} -> {{url}}", fields: [
                {label: "Name", name: "name", widget: "string"},
                {label: "URL Path", name: "url", widget: "string"}
              ]}
            ]}

      - file: "content/media-center.md"
        label: "Media Center Hub"
        name: "media_center"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Layout", name: "layout", widget: "hidden", default: "media_center"}
          - {label: "Kicker", name: "kicker", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "text"}
          - {label: "Directory Navigation Cards", name: "cards", widget: "list", summary: "{{title}}", fields: [
              {label: "Card Title", name: "title", widget: "string"},
              {label: "Icon (e.g. mail, film, book, clipboard)", name: "icon", widget: "string", required: false},
              {label: "Description Text", name: "text", widget: "text"},
              {label: "Destination Link", name: "url", widget: "string"}
            ]}

      - file: "content/contacts.md"
        label: "Contacts & FAQs"
        name: "contacts"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Layout", name: "layout", widget: "hidden", default: "contacts"}
          - {label: "Kicker", name: "kicker", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "text"}
          - {label: "Body Content", name: "body", widget: "markdown"}

