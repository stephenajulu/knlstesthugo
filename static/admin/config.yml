              {label: "Ecitizen Label Text", name: "ecitizen_label", widget: "string", required: false},
              {label: "Ecitizen Target Link", name: "ecitizen_url", widget: "string", required: false},
              {label: "Staff Portal Label Text", name: "staff_label", widget: "string", required: false},
              {label: "Staff Portal Target Link", name: "staff_url", widget: "string", required: false},
              {label: "Suppliers Portal Label Text", name: "suppliers_label", widget: "string", required: false},
              {label: "Suppliers Portal Target Link", name: "suppliers_url", widget: "string", required: false}
            ]}
          - {label: "Header Main Menu Options", name: "main_menu", widget: "list", summary: "{{name}}", fields: [
              {label: "Category Name (e.g. Services, About)", name: "name", widget: "string"},
              {label: "Direct Link URL (if no dropdown)", name: "url", widget: "string", required: false},
              {label: "Dropdown Submenus List (Optional)", name: "dropdown", widget: "list", required: false, summary: "{{name}} -> {{url}}", fields: [
                {label: "Link Name", name: "name", widget: "string"},
                {label: "Link Target URL", name: "url", widget: "string"},
                {label: "Timed Expiration Date (Optional)", name: "expiry", widget: "datetime", required: false, format: "YYYY-MM-DDTHH:mm:ssZZ"}
              ]}
            ]}
          - {label: "Footer Navigation Links Columns", name: "footer_columns", widget: "list", summary: "Column: {{title}}", fields: [
              {label: "Column Title", name: "title", widget: "string"},
              {label: "Links list", name: "links", widget: "list", summary: "{{name}} -> {{url}}", fields: [
