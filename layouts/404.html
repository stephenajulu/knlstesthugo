{{ define "main" }}
  <section class="page-hero page-hero--404 who-page-hero--compact" style="text-align: center; padding: 8rem 1rem;">
    <div class="container page-hero__inner" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
      <p class="kicker" style="color: #E87722; font-weight: 800; font-size: 1.5rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em;">Error 404</p>
      <h1 style="font-size: 3rem; margin-bottom: 1.5rem; color: #2D2C8E; font-weight: 800;">Page Not Found</h1>
      <p style="max-width: 600px; font-size: 1.2rem; line-height: 1.7; margin-bottom: 2.5rem; color: #4A4A4A;">
        The page you are looking for does not exist, has been moved, or is temporarily unavailable. 
        Use the search icon at the top right, or click below to return home.
      </p>
      <a href="/" class="btn btn--orange" style="padding: 0.9rem 2.2rem; font-weight: 600; text-decoration: none; border-radius: 4px; transition: background-color 0.2s ease;">Return to Homepage</a>
    </div>
  </section>
{{ end }}
