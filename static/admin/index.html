<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>KNLS Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* 🎨 Polished Decap CMS Branding Overhaul (CloudCannon Aesthetic) */
    
    /* Global Styles */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
      background-color: #f8fafc !important;
    }

    /* Sidebar Container Styling */
    aside {
      background-color: #0f172a !important; /* Deep Blue-Grey */
      border-right: 1px solid #1e293b !important;
      padding: 1.5rem 1rem !important;
    }

    /* 💡 Welcome Note at the top of the Sidebar */
    aside::before {
      content: "KNLS EDITING PORTAL\aSelect a section below to update pages. Save your changes as a draft, review, and click 'Publish' to make them live." !important;
      white-space: pre-wrap !important;
      display: block !important;
      font-size: 0.72rem !important;
      font-weight: 500 !important;
      color: #94a3b8 !important;
      line-height: 1.4 !important;
      border-bottom: 1px solid #1e293b !important;
      padding-bottom: 1rem !important;
      margin-bottom: 1rem !important;
      letter-spacing: 0.02em !important;
    }

    /* Sidebar Navigation Links */
    aside a {
      color: #94a3b8 !important;
      font-family: 'Inter', sans-serif !important;
      font-weight: 500 !important;
      border-radius: 0.375rem !important;
      margin-bottom: 0.25rem !important;
      padding: 0.625rem 0.875rem !important;
      transition: all 0.2s ease-in-out !important;
      display: flex !important;
      align-items: center !important;
    }

    aside a:hover {
      background-color: #1e293b !important;
      color: #f1f5f9 !important;
    }

    /* Active Sidebar Navigation Link */
    aside a[class*="active"], aside a[aria-current="page"] {
      background-color: #2D2C8E !important; /* KNLS Official Blue */
      color: #ffffff !important;
      font-weight: 600 !important;
      box-shadow: 0 4px 6px -1px rgba(45, 44, 142, 0.2), 0 2px 4px -1px rgba(45, 44, 142, 0.1) !important;
    }

    /* Top App Header bar styling with KNLS Logo */
    header {
      background-color: #ffffff !important;
      border-bottom: 1px solid #e2e8f0 !important;
      box-shadow: none !important;
      padding-left: 1.5rem !important;
      display: flex !important;
      align-items: center !important;
    }

    header::before {
      content: "";
      display: inline-block !important;
      width: 110px !important;
      height: 40px !important;
      background: url("https://www.knls.ac.ke/wp-content/uploads/2021/09/knlslogo1.png") no-repeat center/contain !important;
      margin-right: 1.5rem !important;
      align-self: center !important;
    }

    header h1, header span {
      font-family: 'Inter', sans-serif !important;
      font-weight: 700 !important;
      color: #0f172a !important;
    }

    /* Clean Card Layout for Fields */
    main > div > div {
      background: #ffffff !important;
      border: 1px solid #e2e8f0 !important;
      border-radius: 0.5rem !important;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05) !important;
    }

    /* Polish Form Input Elements */
    input, textarea, select {
      font-family: 'Inter', sans-serif !important;
      border-radius: 0.375rem !important;
      border: 1px solid #cbd5e1 !important;
      padding: 0.625rem 0.875rem !important;
      font-size: 0.875rem !important;
      color: #334155 !important;
      transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #2D2C8E !important;
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(45, 44, 142, 0.15) !important;
    }

    /* Custom Accent Color for Buttons */
    button {
      font-family: 'Inter', sans-serif !important;
      border-radius: 0.375rem !important;
      transition: all 0.2s ease !important;
    }

    /* Primary Save / Publish Button Styles */
    button[class*="Publish"], button[class*="Save"], button[class*="publish"] {
      background-color: #F48312 !important; /* KNLS Official Orange */
      color: #ffffff !important;
      font-weight: 600 !important;
      border: none !important;
      padding: 0.625rem 1.25rem !important;
      box-shadow: 0 4px 6px -1px rgba(244, 131, 18, 0.2) !important;
    }

    button[class*="Publish"]:hover, button[class*="Save"]:hover {
      background-color: #d66f0b !important;
    }

    /* 🗂️ CloudCannon-style Sidebar Categories Injection */
    aside ul {
      display: flex !important;
      flex-direction: column !important;
      list-style: none !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* Section 1: CONTENT MANAGEMENT */
    aside ul li:nth-child(1)::before {
      content: "CONTENT MANAGEMENT" !important;
      display: block !important;
      font-size: 0.7rem !important;
      font-weight: 700 !important;
      color: #475569 !important;
      letter-spacing: 0.075em !important;
      margin: 0.5rem 0 0.5rem 0.875rem !important;
      font-family: 'Inter', sans-serif !important;
    }

    /* Section 2: SETTINGS & MENUS */
    aside ul li:nth-child(8)::before {
      content: "SETTINGS & MENUS" !important;
      display: block !important;
      font-size: 0.7rem !important;
      font-weight: 700 !important;
      color: #475569 !important;
      letter-spacing: 0.075em !important;
      margin: 1.5rem 0 0.5rem 0.875rem !important;
      font-family: 'Inter', sans-serif !important;
    }

    /* Floating Walkthrough Tour Button */
    #knls-tour-btn {
      position: fixed !important;
      bottom: 20px !important;
      right: 20px !important;
      background-color: #2D2C8E !important;
      color: #ffffff !important;
      border: none !important;
      border-radius: 999px !important;
      padding: 10px 18px !important;
      font-size: 0.85rem !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      box-shadow: 0 10px 15px -3px rgba(45, 44, 142, 0.3), 0 4px 6px -4px rgba(45, 44, 142, 0.3) !important;
      z-index: 999999 !important;
      display: flex !important;
      align-items: center !important;
      gap: 6px !important;
      transition: all 0.2s ease !important;
    }

    #knls-tour-btn:hover {
      background-color: #F48312 !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 10px 15px -3px rgba(244, 131, 18, 0.4) !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    // Register custom typography and layout styles to render previews correctly
    CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");
    CMS.registerPreviewStyle("/assets/css/styles.css");

    // Custom Alert Box shortcode component
    CMS.registerEditorComponent({
      id: "alert",
      label: "Alert Box",
      fields: [
        {
          name: "type",
          label: "Alert Type",
          widget: "select",
          options: ["info", "success", "warning"],
          default: "info"
        },
        {
          name: "title",
          label: "Alert Title (Optional)",
          widget: "string",
          required: false
        },
        {
          name: "content",
          label: "Alert Content",
          widget: "text"
        }
      ],
      pattern: /^\{\{% alert type="(\S+)"(?: title="([^"]+)")? %\}\}\n?([\s\S]+?)\n?\{\{% \/alert %\}\}/,
      fromBlock: match => ({
        type: match[1],
        title: match[2] || "",
        content: match[3]
      }),
      toBlock: obj => {
        const titleAttr = obj.title ? ` title="${obj.title}"` : "";
        return `{{% alert type="${obj.type}"${titleAttr} %}}\n${obj.content}\n{{% /alert %}}`;
      },
      toPreview: obj => {
        const titleHtml = obj.title ? `<strong style="display:block;margin-bottom:0.25rem;">${obj.title}</strong>` : "";
        const bgColors = { info: "#E8EAF6", success: "#E8F5E9", warning: "#FFF3E0" };
        const borderColors = { info: "#2D2C8E", success: "#2E7D32", warning: "#E87722" };
        return `
          <div style="padding:1rem; border-left:5px solid ${borderColors[obj.type] || "#2D2C8E"}; background:${bgColors[obj.type] || "#E8EAF6"}; border-radius:4px; margin:1rem 0; font-family: sans-serif;">
            ${titleHtml}
            <div>${obj.content}</div>
          </div>
        `;
      }
    });

    // Custom YouTube embed shortcode component
    CMS.registerEditorComponent({
      id: "youtube",
      label: "YouTube Embed",
      fields: [
        {
          name: "id",
          label: "YouTube Video ID",
          widget: "string",
          hint: "e.g. YTKjRukNtvA"
        }
      ],
      pattern: /^\{\{< youtube (\S+) >\}\}/,
      fromBlock: match => ({
        id: match[1]
      }),
      toBlock: obj => `{{< youtube ${obj.id} >}}`,
      toPreview: obj => `
        <div style="background:#f1f5f9; padding:2rem; text-align:center; border: 1px dashed #cbd5e1; border-radius:4px; font-family: sans-serif;">
          <strong>📺 YouTube Video</strong><br/>
          <span style="font-size:0.8rem; color:#64748b;">Video ID: ${obj.id}</span>
        </div>
      `
    });

    // Wait until the CMS interface is loaded to inject the tour button and setup the guide
    const initTour = () => {
      const checkExist = setInterval(() => {
        const sidebar = document.querySelector('aside');
        const header = document.querySelector('header');
        if (sidebar && header) {
          clearInterval(checkExist);
          
          // Create floating tour button
          const tourBtn = document.createElement('button');
          tourBtn.id = 'knls-tour-btn';
          tourBtn.innerHTML = '✨ Start Portal Tour';
          document.body.appendChild(tourBtn);
          
          // Initialize Driver.js
          const driver = window.driver.js.driver;
          const driverObj = driver({
            showProgress: true,
            steps: [
              {
                element: 'header',
                popover: {
                  title: 'Welcome to KNLS Admin',
                  description: 'This is the main admin dashboard for managing the Kenya National Library Service website. The official logo confirms you are in the secure management zone.',
                  position: 'bottom'
                }
              },
              {
                element: 'aside',
                popover: {
                  title: 'Organized Collections Sidebar',
                  description: 'Here you will find all 39 pages grouped into logical sections like Content Management (Core Pages, Services) and Settings & Menus.',
                  position: 'right'
                }
              },
              {
                element: 'aside::before',
                popover: {
                  title: 'Helpful Guidance Notice',
                  description: 'Always remember: changes are saved as drafts first. This gives you a chance to review your edits before they go live on the internet.',
                  position: 'right'
                }
              },
              {
                element: 'header div[class*="AppHeaderContent"]',
                popover: {
                  title: 'Editorial Workflow & Users',
                  description: 'At the top, you can invite new editors, log out, or view active drafts under the editorial workflow tabs.',
                  position: 'bottom'
                }
              },
              {
                element: '#knls-tour-btn',
                popover: {
                  title: 'Walkthrough Complete!',
                  description: 'You are ready to manage the site. If you ever need a refresher, just click this button to restart the tour!',
                  position: 'left'
                }
              }
            ]
          });
          
          tourBtn.addEventListener('click', () => {
            driverObj.drive();
          });
          
          // Auto-start tour for first-time visitors
          if (!localStorage.getItem('knls_tour_completed')) {
            setTimeout(() => {
              driverObj.drive();
              localStorage.setItem('knls_tour_completed', 'true');
            }, 1500);
          }
        }
      }, 500);
    };

    // Load Driver.js resources
    const loadDriverAssets = () => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css';
      document.head.appendChild(link);

      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js';
      script.onload = initTour;
      document.body.appendChild(script);
    };

    window.addEventListener('load', loadDriverAssets);
  </script>
</body>
</html>
