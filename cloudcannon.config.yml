# CloudCannon Configuration for Kenya National Library Service (KNLS) Website
# This configuration configures editing interfaces, file paths, and collections for CloudCannon.

# The relative path to the directory containing your project
source: .

# The directory where Hugo builds the site files (default is public)
output: public

# Paths configuration for assets and uploads
paths:
  uploads: static/assets/images
  dam_uploads: static/assets/images
  static: static

# Group collections in the sidebar navigation
collection_groups:
  - heading: Content Management
    collections:
      - core_pages
      - eresources_pages
      - services_pages
      - isbn_pages
      - media_pages
      - corporate_pages
      - portal_pages
  - heading: Menus & Layouts
    collections:
      - data

# Define the collections of files that can be managed in CloudCannon
collections_config:
  core_pages:
    name: Core Pages
    path: content
    output: true
    icon: home
    parser: front-matter
    glob:
      - "content/_index.md"
      - "content/who-we-are.md"
      - "content/services.md"
      - "content/media-center.md"
      - "content/contacts.md"
      - "content/sitemap.md"
      
  services_pages:
    name: Library Services
    path: content
    output: true
    icon: library_books
    parser: front-matter
    glob:
      - "content/braille-library-services.md"
      - "content/study-and-discussion-rooms.md"
      - "content/interlibrary-loans.md"
      - "content/search-our-collections.md"
      - "content/reference-and-referral-services.md"
      - "content/outreach-services.md"
      - "content/promoting-literacy.md"
      - "content/rare-collections.md"
      - "content/research-consultancy.md"
      - "content/training-programs.md"
      - "content/national-library.md"

  isbn_pages:
    name: ISBN & Bibliography
    path: content
    output: true
    icon: menu_book
    parser: front-matter
    glob:
      - "content/isbn.md"
      - "content/isbn-faqs.md"
      - "content/apply-isbn-online.md"
      - "content/legal-deposit.md"
      - "content/kenya-national-bibliography.md"

  media_pages:
    name: Media & Updates
    path: content
    output: true
    icon: campaign
    parser: front-matter
    glob:
      - "content/events.md"
      - "content/national-reading-day.md"
      - "content/go-virtual.md"
      - "content/tenders.md"
      - "content/knls-in-the-news.md"
      - "content/newsletter.md"

  corporate_pages:
    name: Corporate & Strategy
    path: content
    output: true
    icon: business
    parser: front-matter
    glob:
      - "content/board-of-directors.md"
      - "content/management-team.md"
      - "content/strategic-plan.md"
      - "content/service-charter.md"
      - "content/careers.md"
      - "content/partners-sponsors.md"
      - "content/organizational-structure.md"
      - "content/recognition-awards.md"

  eresources_pages:
    name: E-Resources Gateway
    path: content
    output: true
    icon: online_prediction
    parser: front-matter
    glob:
      - "content/e-resources.md"
      - "content/e-journals.md"
      - "content/open-e-resources.md"
      - "content/subscribed-e-resources.md"
      - "content/e-resources-search-engine.md"

  portal_pages:
    name: Portal Access
    path: content
    output: true
    icon: login
    parser: front-matter
    glob:
      - "content/ecitizen.md"
      - "content/report-corruption.md"
      - "content/staff-login.md"
      - "content/suppliers-portal.md"
      - "content/donate.md"

  data:
    name: Navigation Menus
    path: data
    parser: yaml
    icon: list
    filter:
      extensions:
        - yml
        - yaml

# Configure how front matter fields are presented in the editing sidebar
inputs:
  title:
    type: text
    label: Page Title
    comment: The main title displayed in search engines and page header.
  description:
    type: textarea
    label: Meta Description
    comment: Summarise the page content in 150-160 characters for SEO.
  body_class:
    type: select
    label: Body Styling Class
    comment: Determines layout and style variables for this page.
    options:
      values:
        - home-page
        - who-we-are-page
        - service-tab-page
        - data-center-page
        - ecitizen-page
        - awards-page
        - organizational-structure-page
        - national-reading-day-body
        - page
  data_timed_page:
    type: text
    label: Timed Page Event Key
    comment: Key code used by JavaScript to activate timed-redirection (e.g., national-reading-day).
  data_expiry_date:
    type: datetime
    label: Expiry Date & Time
    comment: The expiration date after which the page redirects (ISO 8601 format).
  data_expired_redirect:
    type: text
    label: Expired Redirect Path
    comment: Root-relative path to redirect visitors to once the expiry date has passed (e.g. /events/#events-gallery).
  main_class:
    type: select
    label: Main Element Class
    comment: Custom CSS classes applied directly to the main content container.
    options:
      values:
        - service-exact-main isbn-service-page
        - service-rich-main
        - service-detail-main
        - e-resources-main
        - e-resources-main e-resource-search-page
        - who-we-are-page
        - page

# Editor interface layout customization
editor:
  default_view: visual
  preview_paths:
    - collection: core_pages
      path: "{url}"
    - collection: services_pages
      path: "{url}"
    - collection: isbn_pages
      path: "{url}"
    - collection: media_pages
      path: "{url}"
    - collection: corporate_pages
      path: "{url}"
    - collection: eresources_pages
      path: "{url}"
    - collection: portal_pages
      path: "{url}"

# Build settings configuration
build:
  command: hugo
  environment:
    - HUGO_VERSION: 0.160.1

# Hugo Shortcodes Mapping inside CloudCannon
_snippets_imports:
  hugo: true

_snippets:
  button:
    template: hugo_shortcode_named_args
    inline: true
    preview:
      text: "Link Button"
      icon: "link"
    definitions:
      include_name: "button"
      named_args:
        - source_key: "href"
          editor_key: "Url"
          type: "string"
        - source_key: "class"
          editor_key: "Class"
          type: "string"
    _inputs:
      Url:
        type: "text"
        label: "Link URL"
        comment: "Destination page path, e.g. /isbn/ or /contacts/"
      Class:
        type: "select"
        label: "Style Class"
        options:
          values:
            - "btn btn--orange"
            - "btn btn--outline"
            - "btn"
  alert:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      text: "Alert / Notice Box"
      icon: "warning"
    definitions:
      include_name: "alert"
      named_args:
        - source_key: "type"
          editor_key: "Type"
          type: "string"
        - source_key: "title"
          editor_key: "Title"
          type: "string"
    _inputs:
      Type:
        type: "select"
        label: "Alert Type"
        options:
          values:
            - "info"
            - "warning"
            - "success"
      Title:
        type: "text"
        label: "Alert Title"
        comment: "Optional bold heading for the notice"
  faq_item:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      text: "FAQ / Collapsible Accordion"
      icon: "expand_more"
    definitions:
      include_name: "faq_item"
      named_args:
        - source_key: "question"
          editor_key: "Question"
          type: "string"
    _inputs:
      Question:
        type: "text"
        label: "FAQ Question"
        comment: "The bold question that toggles the collapse panel"
  youtube:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      text: "YouTube Video Embed"
      icon: "play_circle"
    definitions:
      include_name: "youtube"
      named_args:
        - source_key: "id"
          editor_key: "VideoID"
          type: "string"
    _inputs:
      VideoID:
        type: "text"
        label: "YouTube Video ID"
        comment: "The alphanumeric ID of the video, e.g. dQw4w9WgXcQ"

