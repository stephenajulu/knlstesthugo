<div class="alert-box alert-box--{{ .Get "type" | default "info" }}" style="padding: 1rem 1.5rem; border-left: 5px solid {{ if eq (.Get "type") "warning" }}#E87722{{ else if eq (.Get "type") "success" }}#2E7D32{{ else }}#2D2C8E{{ end }}; background: {{ if eq (.Get "type") "warning" }}#FFF3E0{{ else if eq (.Get "type") "success" }}#E8F5E9{{ else }}#E8EAF6{{ end }}; margin: 1.5rem 0; border-radius: 4px; display: flex; flex-direction: column; gap: 0.5rem;">
  {{ with .Get "title" }}<strong class="alert-box__title" style="color: #111; font-size: 1.1rem; font-family: sans-serif;">{{ . }}</strong>{{ end }}
  <div class="alert-box__content" style="color: #333; line-height: 1.5; font-family: sans-serif;">{{ .Inner | safeHTML }}</div>
</div>
