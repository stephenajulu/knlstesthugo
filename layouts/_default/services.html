{{ define "main" }}
<section class="page-hero page-hero--services-compact">
  <div class="container page-hero__inner">
    <div>
      {{ with .Params.kicker }}<p class="kicker">{{ . }}</p>{{ end }}
      <h1>{{ .Title }}</h1>
      <p>{{ .Params.subtitle | default .Params.description }}</p>
    </div>
    <nav aria-label="Breadcrumb" class="breadcrumbs">
      <a href="/">Home</a>
      <span aria-hidden="true">/</span>
      <span>{{ .Title }}</span>
    </nav>
  </div>
</section>

<section class="section service-directory-section">
  <div class="container">
    {{ with .Params.groups }}
      <div class="service-directory-grid">
        {{ range . }}
          <article class="service-directory-group reveal">
            <p class="kicker">{{ .number }}</p>
            <h2>{{ .title }}</h2>
            <div class="service-directory-links">
              {{ range .links }}
                <a href="{{ .url }}">{{ .name }}</a>
              {{ end }}
            </div>
          </article>
        {{ end }}
      </div>
    {{ end }}
  </div>
</section>
{{ end }}
