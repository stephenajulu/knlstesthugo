<section aria-hidden="true" aria-labelledby="knlsPublicNoticeTitle" class="public-notice-modal" hidden id="knlsPublicNoticeModal" role="dialog">
  <button aria-label="Close public notice" class="public-notice-modal__backdrop" data-public-notice-close type="button"></button>
  <article class="public-notice-modal__card" role="document">
    <button aria-label="Close public notice" class="public-notice-modal__close" data-public-notice-close type="button">×</button>
    <p class="kicker">Public notice</p>
    <h2 id="knlsPublicNoticeTitle">Public notice</h2>
    <p class="public-notice-modal__date" id="knlsPublicNoticeDate"></p>
    <p class="public-notice-modal__summary" id="knlsPublicNoticeSummary"></p>
    <div class="public-notice-modal__actions">
      <a class="btn btn--orange" href="/#" id="knlsPublicNoticeLink">Read full notice</a>
      <button class="btn btn--outline" data-public-notice-close type="button">Close</button>
    </div>
  </article>
</section>
